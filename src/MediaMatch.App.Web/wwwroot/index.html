<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaMatch — Browser Preview</title>
    <base href="./" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #1f1f1f; color: #eee;
                     font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #uno-body { width: 100%; height: 100%; }
        #uno-loading { position: fixed; inset: 0; display: flex; flex-direction: column;
                       align-items: center; justify-content: center; gap: 16px; }
        #uno-loading progress { width: 240px; }
    </style>
</head>
<body>
    <div id="uno-body">
        <div id="uno-loading">
            <div>Loading MediaMatch…</div>
            <progress id="uno-loading-progress"></progress>
        </div>
    </div>

    <!-- The Uno.Wasm.Bootstrap MSBuild target injects the runtime + framework
         loader script here at build time. -->
    <script type="text/javascript" src="./_framework/uno-bootstrap.js"></script>
</body>
</html>
