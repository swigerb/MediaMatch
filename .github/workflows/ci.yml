name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Restore
        run: dotnet restore MediaMatch.slnx
      
      - name: Build (excluding WinUI App — XamlCompiler requires VS)
        run: |
          dotnet build src/MediaMatch.Core --no-restore -c Release
          dotnet build src/MediaMatch.Application --no-restore -c Release
          dotnet build src/MediaMatch.Infrastructure --no-restore -c Release
          dotnet build src/MediaMatch.Infrastructure.Unix --no-restore -c Release
          dotnet build src/MediaMatch.CLI --no-restore -c Release
          dotnet build tests/MediaMatch.Core.Tests --no-restore -c Release
          dotnet build tests/MediaMatch.Application.Tests --no-restore -c Release
          dotnet build tests/MediaMatch.Infrastructure.Tests --no-restore -c Release
          dotnet build tests/MediaMatch.Infrastructure.Unix.Tests --no-restore -c Release
          dotnet build tests/MediaMatch.CLI.Tests --no-restore -c Release
          dotnet build tests/MediaMatch.App.Tests --no-restore -c Release
          dotnet build tests/MediaMatch.EndToEnd.Tests --no-restore -c Release
      
      - name: Test
        run: |
          dotnet test tests/MediaMatch.Core.Tests --no-build -c Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
          dotnet test tests/MediaMatch.Application.Tests --no-build -c Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
          dotnet test tests/MediaMatch.Infrastructure.Tests --no-build -c Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
          dotnet test tests/MediaMatch.Infrastructure.Unix.Tests --no-build -c Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
          dotnet test tests/MediaMatch.CLI.Tests --no-build -c Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
          dotnet test tests/MediaMatch.App.Tests --no-build -c Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
          dotnet test tests/MediaMatch.EndToEnd.Tests --no-build -c Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 7
