name: Cross-Platform Build

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'src/MediaMatch.App.macOS/**'
      - 'src/MediaMatch.App.Linux/**'
      - 'src/MediaMatch.Infrastructure.Unix/**'
      - 'src/MediaMatch.Core/**'
      - 'src/MediaMatch.Application/**'
      - 'src/MediaMatch.Infrastructure/**'
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build shared libraries on all platforms to verify cross-platform compatibility
  shared-libs:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Build Core
        run: dotnet build src/MediaMatch.Core -c Release
      
      - name: Build Application
        run: dotnet build src/MediaMatch.Application -c Release
      
      - name: Build Infrastructure
        run: dotnet build src/MediaMatch.Infrastructure -c Release
      
      - name: Build Infrastructure.Unix
        run: dotnet build src/MediaMatch.Infrastructure.Unix -c Release
      
      - name: Test Core
        run: dotnet test tests/MediaMatch.Core.Tests -c Release --verbosity normal
      
      - name: Test Application
        if: runner.os == 'Windows'
        run: dotnet test tests/MediaMatch.Application.Tests -c Release --verbosity normal
      
      - name: Test Infrastructure.Unix
        run: dotnet test tests/MediaMatch.Infrastructure.Unix.Tests -c Release --verbosity normal

  # macOS head build (requires maccatalyst workload)
  macos:
    runs-on: macos-latest
    needs: shared-libs
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Install Mac Catalyst workload
        run: dotnet workload install maccatalyst
      
      - name: Build macOS head
        run: dotnet build src/MediaMatch.App.macOS -c Release
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mediamatch-macos
          path: src/MediaMatch.App.macOS/bin/Release/
          retention-days: 14

  # Linux head build
  linux:
    runs-on: ubuntu-latest
    needs: shared-libs
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Install X11 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
      
      - name: Build Linux head
        run: dotnet build src/MediaMatch.App.Linux -c Release
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mediamatch-linux
          path: src/MediaMatch.App.Linux/bin/Release/
          retention-days: 14
